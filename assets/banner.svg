<svg width="1200" height="500" viewBox="0 0 1200 500" xmlns="http://www.w3.org/2000/svg"
     text-rendering="geometricPrecision"
     shape-rendering="geometricPrecision">

  <defs>

    <radialGradient id="bg" cx="50%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#02040a"/>
    </radialGradient>

    <linearGradient id="border" x1="0" x2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>

    <linearGradient id="text" x1="0" x2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="50%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>

    <!-- ONLY border glow (not text) -->
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

  </defs>

  <!-- background -->
  <rect width="1200" height="500" fill="url(#bg)"/>

  <!-- border -->
  <rect x="25" y="25" width="1150" height="450" rx="28"
        fill="none"
        stroke="url(#border)"
        stroke-width="2"
        opacity="0.8"
        filter="url(#softGlow)"/>

  <!-- subtle particles -->
  <g fill="#38bdf8" opacity="0.2">
    <circle cx="140" cy="120" r="2"/>
    <circle cx="260" cy="320" r="1.5"/>
    <circle cx="420" cy="180" r="2"/>
    <circle cx="900" cy="160" r="2"/>
    <circle cx="1040" cy="320" r="1.5"/>
    <circle cx="760" cy="380" r="2"/>
    <circle cx="600" cy="120" r="1.5"/>
  </g>

  <!-- LEFT NETWORK -->
  <g stroke="#38bdf8" stroke-width="1" opacity="0.25">
    <circle cx="180" cy="220" r="60"/>
    <circle cx="150" cy="190" r="3"/>
    <circle cx="220" cy="180" r="3"/>
    <circle cx="230" cy="240" r="3"/>
    <circle cx="140" cy="260" r="3"/>
    <line x1="150" y1="190" x2="220" y2="180"/>
    <line x1="220" y1="180" x2="230" y2="240"/>
    <line x1="230" y1="240" x2="140" y2="260"/>
  </g>

  <!-- RIGHT WAVES -->
  <path d="M820 340 C900 260, 980 420, 1060 320"
        fill="none"
        stroke="#a855f7"
        stroke-width="2"
        opacity="0.3"/>

  <path d="M780 360 C880 240, 980 420, 1080 300"
        fill="none"
        stroke="#22d3ee"
        stroke-width="2"
        opacity="0.25"/>

  <!-- NAME (CRISP NOW) -->
  <text x="50%" y="45%" text-anchor="middle"
        fill="url(#text)"
        font-size="64"
        font-family="Arial, sans-serif"
        font-weight="700">

    Akshitha Bannan
  </text>

  <!-- ROLE -->
  <text x="50%" y="57%" text-anchor="middle"
        fill="#cbd5e1"
        font-size="24"
        font-family="Arial, sans-serif"
        letter-spacing="1.5">

    AI ENGINEER • MACHINE LEARNING ENGINEER
  </text>

  </text>

  <!-- TAGLINE -->
  <text x="50%" y="84%" text-anchor="middle"
        fill="#38bdf8"
        font-size="18"
        font-family="Arial, sans-serif"
        font-style="italic">

   Building intelligence that evolves in silence.
  </text>

</svg>
