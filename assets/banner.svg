<svg width="1200" height="420" viewBox="0 0 1200 420" xmlns="http://www.w3.org/2000/svg">

  <defs>

    <!-- Background -->
    <radialGradient id="bg" cx="50%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#02040a"/>
    </radialGradient>

    <!-- Soft neon border -->
    <linearGradient id="border" x1="0" x2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="50%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>

    <!-- Text gradient -->
    <linearGradient id="text" x1="0" x2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="50%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>

  </defs>

  <!-- Background -->
  <rect width="1200" height="420" fill="url(#bg)"/>

  <!-- Border -->
  <rect x="18" y="18" width="1164" height="384" rx="26"
        fill="none"
        stroke="url(#border)"
        stroke-width="1.5"
        opacity="0.75"/>

  <!-- Subtle particles -->
  <g fill="#38bdf8" opacity="0.18">
    <circle cx="160" cy="120" r="2"/>
    <circle cx="260" cy="260" r="1.5"/>
    <circle cx="420" cy="160" r="2"/>
    <circle cx="880" cy="140" r="2"/>
    <circle cx="980" cy="280" r="1.5"/>
    <circle cx="700" cy="300" r="2"/>
  </g>

  <!-- Abstract AI network (left) -->
  <g stroke="#38bdf8" stroke-width="1" opacity="0.25">
    <circle cx="190" cy="200" r="55"/>
    <circle cx="160" cy="170" r="3"/>
    <circle cx="220" cy="165" r="3"/>
    <circle cx="240" cy="220" r="3"/>
    <circle cx="150" cy="240" r="3"/>
    <line x1="160" y1="170" x2="220" y2="165"/>
    <line x1="220" y1="165" x2="240" y2="220"/>
    <line x1="240" y1="220" x2="150" y2="240"/>
  </g>

  <!-- MAIN NAME (FIXED SHARPNESS) -->
  <text x="50%" y="42%" text-anchor="middle"
        fill="url(#text)"
        font-size="62"
        font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif"
        font-weight="700"
        letter-spacing="1"
        text-rendering="geometricPrecision">
    AKSHITHA BANNAN
  </text>

  <!-- ROLE -->
  <text x="50%" y="54%" text-anchor="middle"
        fill="#cbd5e1"
        font-size="24"
        font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif"
        letter-spacing="1">
    AI/ML ENGINEER • DATA SCIENTIST
  </text>

  <!-- TAGLINE (tight spacing) -->
  <text x="50%" y="70%" text-anchor="middle"
        fill="#94a3b8"
        font-size="18"
        font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif"
        font-style="italic">
    Building intelligence that evolves in silence.
  </text>

</svg>
