<svg width="900" height="240" viewBox="0 0 900 240" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <linearGradient id="anim" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f5ff">
        <animate attributeName="stop-color" values="#00f5ff;#a855f7;#ff00ff;#00f5ff" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#a855f7">
        <animate attributeName="stop-color" values="#a855f7;#ff00ff;#00f5ff;#a855f7" dur="6s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
  </defs>

  <rect width="100%" height="100%" fill="#0b0f19"/>

  <text x="50%" y="40%" text-anchor="middle"
        fill="url(#anim)"
        font-size="40"
        font-family="monospace"
        font-weight="700">
    Akshitha Bannan
  </text>

  <text x="50%" y="60%" text-anchor="middle"
        fill="#cbd5e1"
        font-size="15"
        font-family="monospace">
    AI • ML • LLM Systems • RAG • Agents
  </text>

  <text x="50%" y="80%" text-anchor="middle"
        fill="#38bdf8"
        font-size="13"
        font-family="monospace"
        font-style="italic">
    “Building intelligence that evolves in silence.”
  </text>

</svg>
