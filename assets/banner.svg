<svg width="1200" height="420" viewBox="0 0 1200 420" xmlns="http://www.w3.org/2000/svg">

  <defs>

    <!-- Background -->
    <radialGradient id="bg" cx="50%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#050814"/>
    </radialGradient>

    <!-- Clean neon border -->
    <linearGradient id="border" x1="0" x2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="50%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>

    <!-- Main text gradient -->
    <linearGradient id="text" x1="0" x2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="50%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>

  </defs>

  <!-- Background -->
  <rect width="1200" height="420" fill="url(#bg)"/>

  <!-- Border -->
  <rect x="25" y="25" width="1150" height="370" rx="22"
        fill="none"
        stroke="url(#border)"
        stroke-width="2"
        opacity="0.9"/>

  <!-- subtle dots -->
  <g fill="#38bdf8" opacity="0.15">
    <circle cx="180" cy="120" r="2"/>
    <circle cx="260" cy="300" r="1.5"/>
    <circle cx="420" cy="160" r="2"/>
    <circle cx="820" cy="140" r="2"/>
    <circle cx="980" cy="280" r="1.5"/>
    <circle cx="700" cy="320" r="2"/>
  </g>

  <!-- LEFT AI NODE (simple, clean) -->
  <g stroke="#38bdf8" stroke-width="1" opacity="0.25">
    <circle cx="200" cy="220" r="55"/>
    <circle cx="170" cy="190" r="3"/>
    <circle cx="230" cy="200" r="3"/>
    <circle cx="210" cy="250" r="3"/>
    <line x1="170" y1="190" x2="230" y2="200"/>
    <line x1="230" y1="200" x2="210" y2="250"/>
  </g>

  <!-- MAIN NAME (CRISP - NO BLUR) -->
  <text x="50%" y="42%" text-anchor="middle"
        fill="url(#text)"
        font-size="60"
        font-family="Arial, Helvetica, sans-serif"
        font-weight="800">
    AKSHITHA BANNAN
  </text>

  <!-- ROLE -->
  <text x="50%" y="55%" text-anchor="middle"
        fill="#cbd5e1"
        font-size="22"
        font-family="Arial, Helvetica, sans-serif"
        letter-spacing="1">
    AI ENGINEER • MACHINE LEARNING ENGINEER
  </text>

  <!-- CLEAN TAGLINE -->
  <text x="50%" y="72%" text-anchor="middle"
        fill="#94a3b8"
        font-size="18"
        font-family="Arial, Helvetica, sans-serif"
        font-style="italic">
    Building intelligent systems that learn, retrieve, and reason
  </text>

</svg>
